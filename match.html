<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Match Center – GoalPulse</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0d0f14;--surface:#161a24;--card:#1c2132;--border:#252d42;--live:#e8303a;--accent:#00c2ff;--green:#00e676;--muted:#6b7592;--text:#e4e8f4;--sub:#9ca3be;--radius:10px;--fd:'Barlow Condensed',sans-serif;--fb:'Inter',sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
background-color:var(--bg);
background-image:
radial-gradient(ellipse 900px 600px at 15% -10%, rgba(0,194,255,.10), transparent 55%),
radial-gradient(ellipse 800px 700px at 100% 10%, rgba(232,48,58,.08), transparent 55%),
radial-gradient(ellipse 700px 500px at 50% 120%, rgba(0,230,118,.06), transparent 60%);
background-repeat:no-repeat;background-attachment:fixed;
color:var(--text);font-family:var(--fb);font-size:14px;line-height:1.5;min-height:100vh}
a{color:inherit;text-decoration:none}button{cursor:pointer;border:none;background:none;font-family:inherit}
header{position:sticky;top:0;z-index:200;background:rgba(13,15,20,.96);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;gap:12px;height:54px}
.logo{font-family:var(--fd);font-size:26px;font-weight:800;white-space:nowrap}.logo span{color:var(--accent)}
.back-btn{font-size:13px;color:var(--sub);padding:6px 12px;border:1px solid var(--border);border-radius:20px;transition:all .15s}
.back-btn:hover{border-color:var(--accent);color:var(--accent)}
main{max-width:680px;margin:0 auto;padding:20px 16px}
.loading-state{text-align:center;padding:80px 20px;color:var(--muted)}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .75s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.err-box{text-align:center;padding:40px 18px;color:var(--muted);background:var(--card);border-radius:var(--radius);border:1px solid var(--border)}
.err-box .ei{font-size:34px;margin-bottom:8px}
.score-card{background:linear-gradient(135deg,#0f1b36,#1a0f2e);border:1px solid var(--border);border-radius:var(--radius);padding:22px 16px;margin-bottom:14px;position:relative;overflow:hidden;isolation:isolate}

/* Stadium atmosphere: floodlight cones from the top corners + faint pitch-line
   stripes, all pure CSS — no photo asset, no extra API call. */
.score-card::before{
content:'';position:absolute;inset:0;z-index:0;pointer-events:none;
background:
conic-gradient(from 200deg at 0% 0%, rgba(255,255,255,.14), transparent 35deg),
conic-gradient(from -20deg at 100% 0%, rgba(255,255,255,.14), transparent 35deg),
radial-gradient(circle at 70% 20%, rgba(0,194,255,.14), transparent 60%),
repeating-linear-gradient(100deg, rgba(255,255,255,.025) 0 2px, transparent 2px 34px);
filter:blur(2px)}

/* Blurred team crests as ambient watermarks behind each side of the card. */
.crest-blur{position:absolute;top:50%;width:200px;height:200px;object-fit:contain;
transform:translateY(-50%);filter:blur(28px) saturate(1.6);opacity:.30;z-index:0;pointer-events:none;
transition:opacity .4s}
.crest-blur.home{left:-60px}
.crest-blur.away{right:-60px}

/* When the match is live, the crest glow pulses gently and brightens — a quiet
   "this is happening now" cue instead of a loud badge. */
.score-card.is-live .crest-blur{opacity:.42;animation:crestPulse 2.6s ease-in-out infinite}
@keyframes crestPulse{0%,100%{opacity:.32}50%{opacity:.5}}
.score-card.is-live::after{
content:'';position:absolute;inset:0;z-index:0;pointer-events:none;
background:radial-gradient(circle at 50% 100%, rgba(232,48,58,.16), transparent 65%);
animation:liveWash 3s ease-in-out infinite}
@keyframes liveWash{0%,100%{opacity:.6}50%{opacity:1}}

.score-card > *{position:relative;z-index:1}
.league-line{text-align:center;font-size:12px;color:var(--accent);font-weight:600;margin-bottom:16px;letter-spacing:.3px}
.score-teams{display:flex;align-items:center;justify-content:space-between;gap:10px}
.score-team{text-align:center;flex:1;min-width:0}
.score-logo{width:52px;height:52px;object-fit:contain;margin:0 auto 8px;display:block}
.score-team-name{font-family:var(--fd);font-size:16px;font-weight:700;line-height:1.2}
.score-mid{text-align:center;flex-shrink:0;padding:0 8px}
.score-num{font-family:var(--fd);font-size:44px;font-weight:800;line-height:1}
.score-status{margin-top:8px;font-size:12px;font-weight:700;color:var(--live)}
.score-status.notlive{color:var(--muted)}
.score-meta{text-align:center;margin-top:16px;font-size:11px;color:var(--muted)}
.section{margin-bottom:18px}
.section-title{font-family:var(--fd);font-size:16px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.timeline{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.tl-row{display:grid;grid-template-columns:38px 1fr 22px 1fr;align-items:center;gap:8px;padding:10px 13px;border-bottom:1px solid var(--border);font-size:12.5px}
.tl-row:last-child{border-bottom:none}
.tl-row-c{display:grid;grid-template-columns:38px 1fr 22px;align-items:center;gap:8px;padding:10px 13px;border-bottom:1px solid var(--border);font-size:12.5px}
.tl-row-c:last-child{border-bottom:none}
.tl-min{font-weight:700;color:var(--accent);text-align:right}
.tl-icon{text-align:center;font-size:14px}
.tl-home{text-align:right}
.tl-away{text-align:left}
.tl-side{display:flex;flex-direction:column;gap:1px}
.tl-side.empty{visibility:hidden}
.tl-player{font-weight:600}
.tl-detail{color:var(--muted);font-size:11px}
.no-events{padding:18px;text-align:center;color:var(--muted);font-size:12.5px}
footer{border-top:1px solid var(--border);padding:16px;text-align:center;color:var(--muted);font-size:12px;margin-top:24px}
footer a{color:var(--accent)}

/* ── Match Center tabs (Overview / Timeline / Lineups / Stats / Analytics) ── */
.mc-tabs{display:flex;gap:4px;margin-bottom:16px;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.mc-tabs::-webkit-scrollbar{display:none}
.mc-tab{padding:9px 14px;font-size:13.5px;font-weight:600;color:var(--sub);border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;cursor:pointer;transition:color .15s}
.mc-tab:hover{color:var(--text)}
.mc-tab.active{color:var(--live);border-bottom-color:var(--live)}
.tab-spinner{width:26px;height:26px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:30px auto}

.info-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:14px}
.info-card-head{padding:10px 14px;background:var(--surface);font-size:11px;font-weight:700;letter-spacing:1px;color:var(--sub);text-transform:uppercase;border-bottom:1px solid var(--border)}
.info-row{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--border)}
.info-row:last-child{border-bottom:none}
.info-icon{font-size:17px;width:22px;text-align:center;flex-shrink:0}
.info-label{font-size:11px;color:var(--muted)}
.info-val{font-size:13.5px;font-weight:700;margin-top:1px}
.empty-note{padding:24px 16px;text-align:center;color:var(--muted);font-size:12.5px;line-height:1.7}
.empty-note .ic{font-size:20px;margin-right:6px;vertical-align:middle}

.lineup-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:520px){.lineup-grid{grid-template-columns:1fr}}
.xi-head{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--surface);border-bottom:1px solid var(--border)}
.xi-head img{width:16px;height:16px;object-fit:contain}
.xi-head .fm{margin-left:auto;font-size:11px;color:var(--muted)}
.xi-player{display:flex;align-items:center;gap:8px;padding:7px 14px;border-bottom:1px solid rgba(37,45,66,.5);font-size:12.5px}
.xi-player .num{width:18px;color:var(--muted);font-weight:700;font-size:11px;flex-shrink:0}
.bench-label{padding:8px 14px;font-size:10px;font-weight:700;letter-spacing:1px;color:var(--muted);background:rgba(255,255,255,.02)}
.coach-line{padding:9px 14px;font-size:12px;color:var(--muted);border-top:1px solid var(--border)}

.stat-row{padding:9px 14px;border-bottom:1px solid var(--border)}
.stat-row:last-child{border-bottom:none}
.stat-nums{display:flex;justify-content:space-between;font-size:12px;font-weight:700;margin-bottom:5px}
.stat-label{color:var(--muted);font-weight:500;font-size:11px}
.stat-bar{height:5px;border-radius:3px;background:var(--border);overflow:hidden;display:flex}
.stat-bar .h{background:var(--accent)}.stat-bar .a{background:var(--green)}

.h2h-summary{display:flex;align-items:center;justify-content:space-around;padding:16px 14px;text-align:center}
.h2h-num{font-family:var(--fd);font-size:28px;font-weight:800}
.h2h-lbl{font-size:10px;color:var(--muted);letter-spacing:.4px;margin-top:2px}
.form-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border)}
.form-row:last-child{border-bottom:none}
.form-dots{display:flex;gap:4px;margin-left:auto}
.f-dot{width:18px;height:18px;border-radius:4px;font-size:10px;font-weight:800;display:grid;place-items:center;flex-shrink:0}
.f-dot.W{background:var(--green);color:#06210f}.f-dot.D{background:var(--muted);color:#0d0f14}.f-dot.L{background:var(--live);color:#fff}
.meeting-row{display:flex;align-items:center;gap:10px;padding:8px 14px;border-bottom:1px solid var(--border);font-size:12px}
.meeting-row:last-child{border-bottom:none}
.meeting-row .dt{color:var(--muted);width:60px;flex-shrink:0;font-size:10.5px}
.meeting-row .sc{font-weight:700;margin-left:auto}
</style>
</head>
<body>
<header>
<div class="logo">Goal<span>Pulse</span></div>
<a class="back-btn" href="index.html">← Back to scores</a>
</header>
<main id="main"><div class="loading-state"><div class="spinner"></div><p>Loading match…</p></div></main>
<footer><p>© 2026 GoalPulse · Data: <a href="https://www.api-football.com" target="_blank">API-Football</a></p></footer>
<script>
const params = new URLSearchParams(location.search);
const fixtureId = params.get('id');
const userTZ = params.get('tz') || Intl.DateTimeFormat().resolvedOptions().timeZone;

const isLocal = location.hostname==='localhost'||location.hostname==='127.0.0.1'||location.protocol==='file:';
const PROXY = '/api/football';
const LOCAL_DEV_KEY = 'YOUR_API_FOOTBALL_KEY_FOR_LOCAL_TESTING_ONLY';

async function apiFetch(path, params = {}) {
const qs = new URLSearchParams(params).toString();
const url = isLocal
? `https://v3.football.api-sports.io/${path}${qs ? '?'+qs : ''}`
: `${PROXY}?path=${encodeURIComponent(path)}${qs ? '&'+qs : ''}`;
const headers = isLocal ? {'x-apisports-key': LOCAL_DEV_KEY} : {};
const r = await fetch(url, {headers});
if (!r.ok) { const t = await r.text().catch(()=>''); throw new Error(`HTTP ${r.status}: ${t.slice(0,150)}`); }
return r.json();
}

const LIVE_CODES = ['1H','2H','ET','P','BT','SUSP','INT','LIVE'];
const FINISHED_CODES = ['FT','AET','PEN','AWD','WO'];

function minuteLabel(fx) {
const s = fx.fixture.status.short;
const el = fx.fixture.status.elapsed;
if (s==='HT') return 'Half-time';
if (s==='BT') return 'Break';
if (s==='SUSP') return 'Suspended';
if (s==='INT') return 'Interrupted';
if (s==='P') return 'Penalties';
if (FINISHED_CODES.includes(s)) return s==='AET'?'Full-time (AET)':s==='PEN'?'Full-time (Pens)':'Full-time';
if (LIVE_CODES.includes(s)) return (el!=null ? el+"'" : 'Live') + ' · Live';
return new Date(fx.fixture.date).toLocaleString([], {weekday:'short', hour:'2-digit', minute:'2-digit'});
}

function isLiveOrPast(fx) {
return LIVE_CODES.includes(fx.fixture.status.short) || fx.fixture.status.short==='HT' || FINISHED_CODES.includes(fx.fixture.status.short);
}

function eventIcon(ev) {
if (ev.type === 'Goal') {
if (ev.detail === 'Own Goal') return '⚽🔴';
if (ev.detail && ev.detail.includes('Penalty') && ev.detail.includes('Missed')) return '❌';
if (ev.detail && ev.detail.includes('Penalty')) return '⚽(P)';
return '⚽';
}
if (ev.type === 'Card') return ev.detail === 'Red Card' ? '🟥' : '🟨';
if (ev.type === 'subst') return '🔄';
if (ev.type === 'Var') return '📺';
return '•';
}

function eventLine(ev) {
const min = (ev.time.elapsed ?? '') + (ev.time.extra ? '+' + ev.time.extra : '') + "'";
let player = `<div class="tl-player">${ev.player?.name || 'Unknown'}</div>`;
let detail = '';
if (ev.type === 'Goal') {
detail = ev.assist?.name ? `Assist: ${ev.assist.name}` : (ev.detail && ev.detail !== 'Normal Goal' ? ev.detail : '');
} else if (ev.type === 'Card') {
detail = ev.detail || '';
} else if (ev.type === 'subst') {
player = `<div class="tl-player">${ev.assist?.name || ev.player?.name || 'Unknown'} <span style="color:var(--green)">↑</span></div>`;
detail = `${ev.player?.name || ''} <span style="color:var(--live)">↓</span>`;
}
return { min, player, detail };
}

function renderGroup(title, icon, evs, fx) {
if (!evs.length) return '';
const rows = evs.map(ev => {
const {min, player, detail} = eventLine(ev);
const isHome = ev.team.id === fx.teams.home.id;
return `<div class="tl-row">
<div class="tl-min">${min}</div>
<div class="tl-side ${isHome?'':'empty'} tl-home">${isHome?player:''}${isHome&&detail?`<div class="tl-detail">${detail}</div>`:''}</div>
<div class="tl-icon">${eventIcon(ev)}</div>
<div class="tl-side ${!isHome?'':'empty'} tl-away">${!isHome?player:''}${!isHome&&detail?`<div class="tl-detail">${detail}</div>`:''}</div>
</div>`;
}).join('');
return `<div class="section">
<div class="section-title">${icon} ${title}</div>
<div class="timeline">${rows}</div>
</div>`;
}

/* Condensed events feed used on the Overview tab — a few most recent items only */
function condensedEventsHTML(events, fx) {
if (!events.length) return '';
const rows = events.slice(0, 8).map(ev => {
const min = (ev.time.elapsed ?? '') + (ev.time.extra ? '+' + ev.time.extra : '') + "'";
const teamName = ev.team.id === fx.teams.home.id ? fx.teams.home.name : fx.teams.away.name;
let text = ev.player?.name || 'Unknown';
if (ev.type === 'subst') text = `${ev.assist?.name || ev.player?.name || '?'} ↑ · ${ev.player?.name || '?'} ↓`;
return `<div class="tl-row-c">
<div class="tl-min">${min}</div>
<div><div class="tl-player">${text}</div><div class="tl-detail">${teamName}</div></div>
<div class="tl-icon">${eventIcon(ev)}</div>
</div>`;
}).join('');
return `<div class="timeline">${rows}</div>`;
}

/* Stats rows shared by Overview (curated) and the Stats tab (full list) */
function statsRowsHTML(statsArr, fx, full) {
if (!statsArr || statsArr.length < 2) return '';
const homeStats = statsArr.find(s => s.team.id === fx.teams.home.id)?.statistics || [];
const awayStats = statsArr.find(s => s.team.id === fx.teams.away.id)?.statistics || [];
if (!homeStats.length && !awayStats.length) return '';
const curated = ['Shots on Goal','Total Shots','Corner Kicks','Fouls','Ball Possession','Yellow Cards','Red Cards'];
const types = full ? [...new Set([...homeStats.map(s=>s.type), ...awayStats.map(s=>s.type)])] : curated;
const rows = types.map(type => {
const h = homeStats.find(s => s.type === type)?.value;
const a = awayStats.find(s => s.type === type)?.value;
if (h == null && a == null) return '';
const hv = parseFloat(h) || 0, av = parseFloat(a) || 0;
const tot = (hv + av) || 1;
return `<div class="stat-row">
<div class="stat-nums"><span>${h ?? 0}</span><span class="stat-label">${type}</span><span>${a ?? 0}</span></div>
<div class="stat-bar"><div class="h" style="width:${hv/tot*100}%"></div><div class="a" style="width:${av/tot*100}%"></div></div>
</div>`;
}).filter(Boolean).join('');
return rows;
}

/* ══════════════════════════════════════
STATE
══════════════════════════════════════ */
let currentFx = null;
let currentEvents = [];
let activeTab = 'overview';
const tabCache = {}; // stats, lineups, h2h, homeForm, awayForm — fetched lazily, once each

/* ══════════════════════════════════════
LOAD — base fixture + events, then render the shell + Overview
══════════════════════════════════════ */
async function load() {
const main = document.getElementById('main');
if (!fixtureId) {
main.innerHTML = `<div class="err-box"><div class="ei">⚠️</div><p>No match selected.</p></div>`;
return;
}
try {
const [fxData, evData] = await Promise.all([
apiFetch('fixtures', { id: fixtureId, timezone: userTZ }),
apiFetch('fixtures/events', { fixture: fixtureId }),
]);
const fx = fxData.response?.[0];
if (!fx) { main.innerHTML = `<div class="err-box"><div class="ei">⚠️</div><p>Match not found.</p></div>`; return; }

currentFx = fx;
currentEvents = (evData.response || []).slice().sort((a,b) => {
const am = (a.time.elapsed||0) + (a.time.extra||0)/100;
const bm = (b.time.elapsed||0) + (b.time.extra||0)/100;
return am - bm;
});

renderShell();

scheduleLivePoll();
} catch(e) {
main.innerHTML = `<div class="err-box"><div class="ei">⚠️</div><p><strong>Could not load match</strong><br><br>${e.message}</p></div>`;
}
}

/* ══════════════════════════════════════
POLLING — only while the match is actually live, and only while the
tab is visible. Slowed slightly from 20s → 25s, and a backgrounded tab
stops polling entirely instead of quietly burning requests. Coming back
to a live match refreshes immediately so the score isn't stale.
══════════════════════════════════════ */
const LIVE_POLL_MS = 300000; // 5 min — matches the proxy's cache TTL, no point polling faster than data actually refreshes
let liveTimer = null;

function isCurrentlyLive(fx) {
return LIVE_CODES.includes(fx.fixture.status.short) || fx.fixture.status.short === 'HT';
}

function scheduleLivePoll() {
if (liveTimer) clearTimeout(liveTimer);
if (!currentFx || !isCurrentlyLive(currentFx)) return; // match isn't live — nothing to poll
liveTimer = setTimeout(() => {
if (document.visibilityState === 'visible') {
load();
} else {
scheduleLivePoll(); // keep the loop alive, just skip the fetch while hidden
}
}, LIVE_POLL_MS);
}

document.addEventListener('visibilitychange', () => {
if (document.visibilityState === 'visible' && currentFx && isCurrentlyLive(currentFx)) {
load();
}
});

function renderShell() {
const fx = currentFx;
const isLive = LIVE_CODES.includes(fx.fixture.status.short) || fx.fixture.status.short==='HT';
const main = document.getElementById('main');

const tabs = [
{ id:'overview', label:'Overview' },
{ id:'timeline', label:'Timeline' },
{ id:'lineups', label:'Lineups' },
{ id:'stats', label:'Stats' },
{ id:'analytics', label:'Analytics' },
];

main.innerHTML = `
<div class="score-card${isLive?' is-live':''}">
<img class="crest-blur home" src="${fx.teams.home.logo||''}" aria-hidden="true" onerror="this.style.display='none'">
<img class="crest-blur away" src="${fx.teams.away.logo||''}" aria-hidden="true" onerror="this.style.display='none'">
<div class="league-line">${fx.league.name} ${fx.league.round ? '· ' + fx.league.round : ''}</div>
<div class="score-teams">
<div class="score-team">
<img src="${fx.teams.home.logo||''}" class="score-logo" onerror="this.style.display='none'">
<div class="score-team-name">${fx.teams.home.name}</div>
</div>
<div class="score-mid">
<div class="score-num">${fx.goals.home ?? '–'} – ${fx.goals.away ?? '–'}</div>
<div class="score-status ${isLive?'':'notlive'}">${minuteLabel(fx)}</div>
</div>
<div class="score-team">
<img src="${fx.teams.away.logo||''}" class="score-logo" onerror="this.style.display='none'">
<div class="score-team-name">${fx.teams.away.name}</div>
</div>
</div>
<div class="score-meta">${fx.fixture.venue?.name ? fx.fixture.venue.name + ' · ' : ''}${new Date(fx.fixture.date).toLocaleDateString([], {weekday:'long', month:'short', day:'numeric'})}</div>
</div>

<div class="mc-tabs" id="mcTabs">
${tabs.map(t => `<div class="mc-tab${t.id===activeTab?' active':''}" data-tab="${t.id}">${t.label}</div>`).join('')}
</div>
<div id="tabBody"><div class="tab-spinner"></div></div>
`;

document.querySelectorAll('.mc-tab').forEach(el => {
el.onclick = () => {
if (el.dataset.tab === activeTab) return;
document.querySelectorAll('.mc-tab').forEach(x => x.classList.remove('active'));
el.classList.add('active');
activeTab = el.dataset.tab;
renderTab(activeTab);
};
});

renderTab(activeTab);
}

/* ══════════════════════════════════════
TAB DISPATCH
══════════════════════════════════════ */
function renderTab(tab) {
if (tab === 'overview') return renderOverview();
if (tab === 'timeline') return renderTimeline();
if (tab === 'lineups') return renderLineups();
if (tab === 'stats') return renderStats();
if (tab === 'analytics') return renderAnalytics();
}

/* ── OVERVIEW ── */
async function renderOverview() {
const body = document.getElementById('tabBody');
const fx = currentFx;
body.innerHTML = `<div class="tab-spinner"></div>`;

if (!tabCache.stats) {
try { tabCache.stats = (await apiFetch('fixtures/statistics', { fixture: fixtureId })).response || []; }
catch { tabCache.stats = []; }
}
if (activeTab !== 'overview') return; // user switched tabs while this was loading

const venue = fx.fixture.venue?.name
? fx.fixture.venue.name + (fx.fixture.venue.city ? ', ' + fx.fixture.venue.city : '')
: 'Not available';
const referee = fx.fixture.referee || 'Not available';
const dateStr = new Date(fx.fixture.date).toLocaleDateString([], { month:'long', day:'numeric', year:'numeric' });

const statsHTML = statsRowsHTML(tabCache.stats, fx, false);
const eventsHTML = condensedEventsHTML(currentEvents, fx);

body.innerHTML = `
<div class="info-card">
<div class="info-card-head">Match Info</div>
<div class="info-row"><span class="info-icon">🏟️</span><div><div class="info-label">Stadium</div><div class="info-val">${venue}</div></div></div>
<div class="info-row"><span class="info-icon">🟨</span><div><div class="info-label">Referee</div><div class="info-val">${referee}</div></div></div>
<div class="info-row"><span class="info-icon">📅</span><div><div class="info-label">Date</div><div class="info-val">${dateStr}</div></div></div>
</div>
<div class="info-card">
<div class="info-card-head">Team Statistics</div>
${statsHTML || `<div class="empty-note"><span class="ic">📊</span>Detailed statistics aren't provided by the data source for this fixture.</div>`}
</div>
<div class="info-card">
<div class="info-card-head">Match Events</div>
${eventsHTML || `<div class="empty-note"><span class="ic">📭</span>No match events recorded yet.</div>`}
</div>
`;
}

/* ── TIMELINE ── */
function renderTimeline() {
const body = document.getElementById('tabBody');
const fx = currentFx;
const goals = currentEvents.filter(e => e.type === 'Goal');
const cards = currentEvents.filter(e => e.type === 'Card');
const subs = currentEvents.filter(e => e.type === 'subst');
const html = `${renderGroup('Goals','⚽',goals,fx)}${renderGroup('Cards','🟨',cards,fx)}${renderGroup('Substitutions','🔄',subs,fx)}`;
body.innerHTML = currentEvents.length
? html
: `<div class="info-card"><div class="empty-note"><span class="ic">⏱️</span>No timeline data has been published for this fixture yet.<br>Check back closer to kick-off or during the match.</div></div>`;
}

/* ── LINEUPS ── */
async function renderLineups() {
const body = document.getElementById('tabBody');
const fx = currentFx;
body.innerHTML = `<div class="tab-spinner"></div>`;

if (!tabCache.lineups) {
try { tabCache.lineups = (await apiFetch('fixtures/lineups', { fixture: fixtureId })).response || []; }
catch { tabCache.lineups = []; }
}
if (activeTab !== 'lineups') return;

const data = tabCache.lineups;
if (!data.length || !data.some(t => (t.startXI||[]).length)) {
const hint = !isLiveOrPast(fx) ? '<br>Lineups are usually published shortly before kick-off.' : '';
body.innerHTML = `<div class="info-card"><div class="empty-note"><span class="ic">📋</span>Lineups aren't available for this fixture yet.${hint}</div></div>`;
return;
}

const sideHTML = (t) => {
const startRows = (t.startXI||[]).map(p => `<div class="xi-player"><span class="num">${p.player.number ?? ''}</span>${p.player.name}${p.player.pos ? ` <span style="color:var(--muted);font-size:10.5px">· ${p.player.pos}</span>` : ''}</div>`).join('');
const benchRows = (t.substitutes||[]).length
? `<div class="bench-label">SUBSTITUTES</div>${t.substitutes.map(p => `<div class="xi-player"><span class="num">${p.player.number ?? ''}</span>${p.player.name}</div>`).join('')}`
: '';
const coachLine = t.coach?.name ? `<div class="coach-line">Coach: ${t.coach.name}</div>` : '';
return `<div class="info-card">
<div class="xi-head"><img src="${t.team.logo||''}" onerror="this.style.display='none'"><b>${t.team.name}</b><span class="fm">${t.formation||''}</span></div>
${startRows}
${benchRows}
${coachLine}
</div>`;
};

body.innerHTML = `<div class="lineup-grid">${data.map(sideHTML).join('')}</div>`;
}

/* ── STATS ── */
async function renderStats() {
const body = document.getElementById('tabBody');
const fx = currentFx;
body.innerHTML = `<div class="tab-spinner"></div>`;

if (!tabCache.stats) {
try { tabCache.stats = (await apiFetch('fixtures/statistics', { fixture: fixtureId })).response || []; }
catch { tabCache.stats = []; }
}
if (activeTab !== 'stats') return;

const rows = statsRowsHTML(tabCache.stats, fx, true);
body.innerHTML = rows
? `<div class="info-card"><div class="info-card-head">Match Statistics</div>${rows}</div>`
: `<div class="info-card"><div class="empty-note"><span class="ic">📊</span>Detailed statistics aren't provided by the data source for this fixture.</div></div>`;
}

/* ── ANALYTICS — real head-to-head + last-5 form, both pulled live ── */
async function renderAnalytics() {
const body = document.getElementById('tabBody');
const fx = currentFx;
body.innerHTML = `<div class="tab-spinner"></div>`;

try {
if (!tabCache.h2h) tabCache.h2h = (await apiFetch('fixtures/headtohead', { h2h: `${fx.teams.home.id}-${fx.teams.away.id}`, last: 10 })).response || [];
if (!tabCache.homeForm) tabCache.homeForm = (await apiFetch('fixtures', { team: fx.teams.home.id, last: 5 })).response || [];
if (!tabCache.awayForm) tabCache.awayForm = (await apiFetch('fixtures', { team: fx.teams.away.id, last: 5 })).response || [];
} catch(e) {
if (activeTab !== 'analytics') return;
body.innerHTML = `<div class="info-card"><div class="empty-note"><span class="ic">⚠️</span>Couldn't load analytics (${e.message}).</div></div>`;
return;
}
if (activeTab !== 'analytics') return;

const h2h = tabCache.h2h;
let homeWins = 0, awayWins = 0, draws = 0, totalGoals = 0;
h2h.forEach(m => {
const hg = m.goals.home ?? 0, ag = m.goals.away ?? 0;
totalGoals += hg + ag;
const fxHomeIsMatchHome = m.teams.home.id === fx.teams.home.id;
const homeScore = fxHomeIsMatchHome ? hg : ag;
const awayScore = fxHomeIsMatchHome ? ag : hg;
if (homeScore > awayScore) homeWins++;
else if (awayScore > homeScore) awayWins++;
else draws++;
});

const h2hHTML = h2h.length ? `
<div class="info-card">
<div class="info-card-head">Head-to-Head (last ${h2h.length} meetings)</div>
<div class="h2h-summary">
<div><div class="h2h-num" style="color:var(--accent)">${homeWins}</div><div class="h2h-lbl">${fx.teams.home.name} wins</div></div>
<div><div class="h2h-num" style="color:var(--muted)">${draws}</div><div class="h2h-lbl">Draws</div></div>
<div><div class="h2h-num" style="color:var(--green)">${awayWins}</div><div class="h2h-lbl">${fx.teams.away.name} wins</div></div>
</div>
<div style="padding:0 14px 12px;font-size:11px;color:var(--muted)">Total goals across these meetings: ${totalGoals}</div>
</div>
<div class="info-card">
<div class="info-card-head">Recent Meetings</div>
${h2h.slice(0,5).map(m => `<div class="meeting-row"><span class="dt">${new Date(m.fixture.date).toLocaleDateString([], {month:'short',day:'numeric',year:'2-digit'})}</span><span>${m.teams.home.name} vs ${m.teams.away.name}</span><span class="sc">${m.goals.home ?? '–'}–${m.goals.away ?? '–'}</span></div>`).join('')}
</div>` : `<div class="info-card"><div class="empty-note"><span class="ic">📈</span>No previous meetings on record.</div></div>`;

const formRow = (team, matches) => {
if (!matches.length) return `<div class="form-row"><b>${team.name}</b><span class="form-dots"><span style="color:var(--muted);font-size:11px">No recent form data</span></span></div>`;
const dots = matches.slice(-5).map(m => {
const isHome = m.teams.home.id === team.id;
const gf = isHome ? m.goals.home : m.goals.away;
const ga = isHome ? m.goals.away : m.goals.home;
const r = gf > ga ? 'W' : gf < ga ? 'L' : 'D';
return `<span class="f-dot ${r}">${r}</span>`;
}).join('');
return `<div class="form-row"><b>${team.name}</b><span class="form-dots">${dots}</span></div>`;
};

body.innerHTML = `
<div class="info-card">
<div class="info-card-head">Recent Form (last 5)</div>
${formRow(fx.teams.home, tabCache.homeForm)}
${formRow(fx.teams.away, tabCache.awayForm)}
</div>
${h2hHTML}`;
}

load();
</script>
</body>
</html>
